# .github/workflows/spike-pacto.yml  (v2)
# Spike Pacto — arquivo UNICO, Python embutido, resultado no log.
# v2: pega empresaId do dados-pessoais, corrige codigoPessoa, varre ate achar aluno
#     com parcelas (mostra campos: valor/situacao/dataVencimento), e caca o consultor.

name: Spike Pacto

on:
  workflow_dispatch:
    inputs:
      unit:
        description: "Unidade (sufixo do secret PACTO_KEY_<UNIDADE>)"
        required: true
        default: "716NORTE"

jobs:
  spike:
    runs-on: ubuntu-latest
    env:
      UNIT: ${{ inputs.unit }}
      PACTO_KEY_716NORTE: ${{ secrets.PACTO_KEY_716NORTE }}
      PACTO_KEY_905SUL: ${{ secrets.PACTO_KEY_905SUL }}
      PACTO_KEY_604NORTE: ${{ secrets.PACTO_KEY_604NORTE }}
      PACTO_KEY_LAGONORTE: ${{ secrets.PACTO_KEY_LAGONORTE }}
      PACTO_KEY_LAGOSUL: ${{ secrets.PACTO_KEY_LAGOSUL }}
    steps:
      - name: Rodar spike (inline, resultado no log)
        run: |
          python3 - <<'PY'
          import os, json, time, urllib.request, urllib.error, urllib.parse
          import datetime as dt
          G = "https://apigw.pactosolucoes.com.br"
          unit = os.environ.get("UNIT", "716NORTE").upper()
          KEY = os.environ.get("PACTO_KEY_" + unit, "").strip()
          if not KEY:
              print("[erro] variavel PACTO_KEY_" + unit + " nao definida.")
              raise SystemExit(0)
          def call(path, headers=None):
              h = {"Authorization": "Bearer " + KEY}
              if headers: h.update(headers)
              req = urllib.request.Request(G + path, headers=h)
              t = time.time()
              try:
                  with urllib.request.urlopen(req, timeout=40) as r:
                      body = r.read().decode("utf-8", "replace"); code = r.status
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", "replace"); code = e.code
              except Exception as e:
                  return {"status": "EXC", "erro": str(e)[:120]}, None
              return {"status": code, "ms": round((time.time() - t) * 1000)}, body
          def parse(body):
              try:
                  j = json.loads(body)
              except Exception:
                  return None
              return j.get("content", j) if isinstance(j, dict) else j
          def show(tag, path, rec, core=None, extra=""):
              info = {"tag": tag, "path": path, "status": rec.get("status"), "ms": rec.get("ms")}
              if core is not None:
                  if isinstance(core, list):
                      info["tipo"] = "list(len=%d)" % len(core)
                      if core and isinstance(core[0], dict):
                          info["campos"] = sorted(core[0].keys())[:25]
                  elif isinstance(core, dict):
                      info["campos"] = sorted(core.keys())[:25]
              if extra:
                  info["obs"] = extra
              print(json.dumps(info, ensure_ascii=False))
          now = dt.date.today().replace(day=1); ini = (now - dt.timedelta(days=60)).replace(day=1)
          ms = lambda d: int(dt.datetime(d.year, d.month, d.day).timestamp() * 1000)
          print("=== SPIKE Pacto v2 — unidade " + unit + " ===")
          # 1) clientes: coletar varias matriculas
          rec, body = call("/clientes/simples?page=0&size=30")
          core = parse(body); show("clientes", "/clientes/simples", rec, core)
          mats = []
          if isinstance(core, list):
              for it in core:
                  if isinstance(it, dict):
                      m = it.get("matricula") or it.get("codigoCliente") or it.get("codigo")
                      if m is not None: mats.append(str(m))
          print("[info] matriculas coletadas: " + str(len(mats)))
          # 2) dados-pessoais do primeiro -> codigoPessoa + empresaId
          emp = None; codpessoa = None
          if mats:
              rec, body = call("/clientes/%s/dados-pessoais" % mats[0])
              core = parse(body); show("dados-pessoais", "/clientes/{mat}/dados-pessoais", rec, core)
              if isinstance(core, dict):
                  codpessoa = str(core.get("codigoPessoa") or core.get("codPessoa") or "")
                  e = core.get("empresa")
                  if isinstance(e, dict): emp = str(e.get("codigo") or "")
          print("[info] codigoPessoa: " + str(codpessoa) + " | empresaId: " + str(emp))
          # 3) presenca (acessos)
          if codpessoa:
              rec, body = call("/acessos-cliente/by-pessoa/%s?page=0&size=5" % codpessoa)
              show("acessos", "/acessos-cliente/by-pessoa/{cod}", rec, parse(body))
          # 4) faturamento com empresaId
          if emp:
              rec, body = call("/v1/bi/resumo?mesInicial=%d&mesFinal=%d" % (ms(ini), ms(now)), {"empresaId": emp})
              show("faturamento", "/v1/bi/resumo", rec, parse(body))
          # 5) PARCELAS: varrer ate achar aluno com parcelas (revela campos: valor/situacao/dataVencimento)
          print("=== VALOR via parcelas (varrendo ate achar aluno com parcelas) ===")
          achou = False; testados = 0
          for m in mats[:25]:
              testados += 1
              rec, body = call("/parcelas/by-matricula/%s?page=0&size=10&sort=dataVencimento,asc" % m)
              core = parse(body)
              if isinstance(core, list) and len(core) > 0:
                  show("parcelas", "/parcelas/by-matricula/{mat}", rec, core, extra="ALUNO COM PARCELAS apos %d testados" % testados)
                  achou = True
                  break
          if not achou:
              print("[info] nenhum dos %d alunos amostrados tinha parcelas — testar outra unidade/aluno ativo." % testados)
          # 6) vinculo consultor
          print("=== vinculo consultor ===")
          if emp:
              rec, body = call("/gestao-vendas-online/consultores/" + emp)
              show("consultores", "/gestao-vendas-online/consultores/{emp}", rec, parse(body))
          vazio = urllib.parse.quote("{}")
          for variante in ['{"page":0,"size":5}', '{"pagina":0,"tamanho":5}']:
              q = urllib.parse.quote(variante)
              rec, body = call("/gestao-vendas-online/vendas-realizadas?paginadorDTO=%s&filters=%s" % (q, vazio))
              show("vendas-realizadas", "vendas-realizadas paginadorDTO=" + variante, rec, parse(body))
          print("=== fim (nenhuma chave impressa) ===")
          PY
