# .github/workflows/spike-pacto.yml  (v3)
# Fecha os 2 detalhes: presenca com aluno ativo + consultor por venda (vendas-realizadas com filtro de data).

name: Spike Pacto

on:
  workflow_dispatch:
    inputs:
      unit:
        description: "Unidade (sufixo do secret PACTO_KEY_<UNIDADE>)"
        required: true
        default: "716NORTE"

jobs:
  spike:
    runs-on: ubuntu-latest
    env:
      UNIT: ${{ inputs.unit }}
      PACTO_KEY_716NORTE: ${{ secrets.PACTO_KEY_716NORTE }}
      PACTO_KEY_905SUL: ${{ secrets.PACTO_KEY_905SUL }}
      PACTO_KEY_604NORTE: ${{ secrets.PACTO_KEY_604NORTE }}
      PACTO_KEY_LAGONORTE: ${{ secrets.PACTO_KEY_LAGONORTE }}
      PACTO_KEY_LAGOSUL: ${{ secrets.PACTO_KEY_LAGOSUL }}
    steps:
      - name: Rodar spike (inline, resultado no log)
        run: |
          python3 - <<'PY'
          import os, json, time, urllib.request, urllib.error, urllib.parse
          import datetime as dt
          G = "https://apigw.pactosolucoes.com.br"
          unit = os.environ.get("UNIT", "716NORTE").upper()
          KEY = os.environ.get("PACTO_KEY_" + unit, "").strip()
          if not KEY:
              print("[erro] variavel PACTO_KEY_" + unit + " nao definida."); raise SystemExit(0)
          def call(path, headers=None):
              h = {"Authorization": "Bearer " + KEY}
              if headers: h.update(headers)
              req = urllib.request.Request(G + path, headers=h)
              t = time.time()
              try:
                  with urllib.request.urlopen(req, timeout=40) as r:
                      body = r.read().decode("utf-8", "replace"); code = r.status
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", "replace"); code = e.code
              except Exception as e:
                  return {"status": "EXC", "erro": str(e)[:120]}, None
              return {"status": code, "ms": round((time.time() - t) * 1000)}, body
          def parse(body):
              try: j = json.loads(body)
              except Exception: return None
              return j.get("content", j) if isinstance(j, dict) else j
          def show(tag, path, rec, core=None, extra=""):
              info = {"tag": tag, "path": path, "status": rec.get("status"), "ms": rec.get("ms")}
              if core is not None:
                  if isinstance(core, list):
                      info["tipo"] = "list(len=%d)" % len(core)
                      if core and isinstance(core[0], dict): info["campos"] = sorted(core[0].keys())[:30]
                  elif isinstance(core, dict):
                      info["campos"] = sorted(core.keys())[:30]
              if extra: info["obs"] = extra
              print(json.dumps(info, ensure_ascii=False))
          now = dt.date.today().replace(day=1); ini = (now - dt.timedelta(days=60)).replace(day=1)
          ms = lambda d: int(dt.datetime(d.year, d.month, d.day).timestamp() * 1000)
          print("=== SPIKE Pacto v3 — unidade " + unit + " ===")
          rec, body = call("/clientes/simples?page=0&size=40")
          core = parse(body); show("clientes", "/clientes/simples", rec, core)
          mats = []
          if isinstance(core, list):
              for it in core:
                  if isinstance(it, dict):
                      m = it.get("matricula") or it.get("codigoCliente")
                      if m is not None: mats.append(str(m))
          print("[info] matriculas coletadas: " + str(len(mats)))
          ativo = None
          for m in mats[:30]:
              rec, body = call("/parcelas/by-matricula/%s?page=0&size=10&sort=dataVencimento,asc" % m)
              core = parse(body)
              if isinstance(core, list) and core:
                  show("parcelas", "/parcelas/by-matricula/{mat}", rec, core, extra="aluno " + m)
                  ativo = m; break
          if not ativo:
              print("[info] nenhum aluno com parcelas nos amostrados.")
          base = ativo or (mats[0] if mats else None)
          emp = None; cp = None
          if base:
              rec, body = call("/clientes/%s/dados-pessoais" % base)
              core = parse(body); show("dados-pessoais", "/clientes/{mat}/dados-pessoais", rec, core)
              if isinstance(core, dict):
                  cp = str(core.get("codigoPessoa") or "")
                  e = core.get("empresa")
                  if isinstance(e, dict): emp = str(e.get("codigo") or "")
          print("[info] aluno base: %s | codigoPessoa: %s | empresaId: %s" % (str(base), str(cp), str(emp)))
          if cp:
              rec, body = call("/acessos-cliente/by-pessoa/%s?page=0&size=10" % cp)
              show("acessos", "/acessos-cliente/by-pessoa/{cod}", rec, parse(body))
          if emp:
              rec, body = call("/gestao-vendas-online/consultores/" + emp)
              show("consultores", "/gestao-vendas-online/consultores/{emp}", rec, parse(body))
          if emp:
              rec, body = call("/v1/bi/resumo?empresaId=%s&mesInicial=%d&mesFinal=%d" % (emp, ms(ini), ms(now)))
              show("faturamento", "/v1/bi/resumo?empresaId=(query)", rec, parse(body))
          print("=== vinculo consultor (vendas-realizadas) ===")
          d0 = ms((now - dt.timedelta(days=120)).replace(day=1)); d1 = ms(now)
          emph = {"empresaId": emp} if emp else None
          tentativas = [
              ('{"page":0,"size":10}', '{"dataInicial":%d,"dataFinal":%d}' % (d0, d1)),
              ('{"page":0,"size":10}', '{"dataVendaInicio":%d,"dataVendaFim":%d}' % (d0, d1)),
              ('{"pagina":0,"tamanho":10}', '{"dataInicial":%d,"dataFinal":%d}' % (d0, d1)),
          ]
          for pag, filt in tentativas:
              rec, body = call("/gestao-vendas-online/vendas-realizadas?paginadorDTO=%s&filters=%s" % (urllib.parse.quote(pag), urllib.parse.quote(filt)), emph)
              show("vendas-realizadas", "filters=" + filt[:44], rec, parse(body))
          print("=== fim (nenhuma chave impressa) ===")
          PY
