name: Build & Deploy Dashboard Nad'Arte

on:
  schedule:
    # Sexta-feira 13:00 UTC = 10:00 America/Sao_Paulo (gera a agenda da semana seguinte)
    - cron: '0 13 * * 5'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Publicar no Cloudflare? (false = so validar, sem publicar)'
        type: choice
        options: ['true', 'false']
        default: 'true'
      usar_api:
        description: 'Atualizar com a API PACTO? (true = Drive + API; false = so Drive)'
        type: choice
        options: ['true', 'false']
        default: 'true'

permissions:
  contents: write   # para regravar version.txt apos uma rodada bem-sucedida

concurrency:
  group: build-deploy
  cancel-in-progress: false

env:
  CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT || 'nadarte-frequencia' }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install

      - name: Conferir template congelado
        run: |
          if [ ! -s template/template.html ]; then
            echo "::error::template/template.html ausente. Coloque o HTML congelado do dashboard nessa pasta."
            exit 1
          fi

      - name: Coletar bases da API PACTO (fonte unica - cadastro, catraca, contrato)
        env:
          PACTO_KEY_716NORTE:  ${{ secrets.PACTO_KEY_716NORTE }}
          PACTO_KEY_905SUL:    ${{ secrets.PACTO_KEY_905SUL }}
          PACTO_KEY_604NORTE:  ${{ secrets.PACTO_KEY_604NORTE }}
          PACTO_KEY_LAGONORTE: ${{ secrets.PACTO_KEY_LAGONORTE }}
          PACTO_KEY_LAGOSUL:   ${{ secrets.PACTO_KEY_LAGOSUL }}
          # Fotos (PII): ligado so quando a Variable PACTO_FOTOS=1 existir no repo.
          # Pre-requisito: dashboard atras de Cloudflare Access. Adiciona ~1 chamada/aluno.
          PACTO_FOTOS: ${{ vars.PACTO_FOTOS || '' }}
        run: |
          echo "Coletando da API PACTO (pode levar ~30 min; rate-limit por chave)..."
          echo "Fotos: ${PACTO_FOTOS:-desligado}"
          python scripts/pacto_fetch.py data

      - name: Faturamento por unidade (API PACTO) para o ticket dinamico
        continue-on-error: true
        env:
          PACTO_KEY_716NORTE:  ${{ secrets.PACTO_KEY_716NORTE }}
          PACTO_KEY_905SUL:    ${{ secrets.PACTO_KEY_905SUL }}
          PACTO_KEY_604NORTE:  ${{ secrets.PACTO_KEY_604NORTE }}
          PACTO_KEY_LAGONORTE: ${{ secrets.PACTO_KEY_LAGONORTE }}
          PACTO_KEY_LAGOSUL:   ${{ secrets.PACTO_KEY_LAGOSUL }}
        run: python scripts/pacto_faturamento.py data

      - name: Construir freq_multi.json (com checagem de consistencia)
        run: |
          set -o pipefail
          python scripts/build_freq_multi.py data 2>build.log | cat || { echo "::error::build_freq_multi.py falhou (ver traceback abaixo)"; cat build.log; exit 1; }
          cat build.log
          if grep -q '\[WARN\]' build.log; then
            echo "::error::Inconsistencia de churn detectada (ver build.log). Abortando sem publicar."
            exit 1
          fi

      - name: Gerar insights (IA, opcional / Caminho B)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/gen_insights.py data/freq_multi.json || echo "[insights] passo de IA falhou; seguindo sem insights"
          python -c "import json;d=json.load(open('data/freq_multi.json'));print('[insights] total:',len(d.get('insights',[])))"

      - name: Calcular versao, selo e carimbo
        id: meta
        run: |
          OLD_VER=$(tr -d ' \n\r' < version.txt)
          NEW_VER=$(python -c "v='$OLD_VER'.lstrip('v'); print('v%.1f' % (float(v)+0.1))")
          BADGE_DATE=$(TZ=America/Sao_Paulo date +%d/%m)
          N=$(python -c "import json;print(len(json.load(open('data/freq_multi.json'))['students']))")
          JUNMAX=$(python -c "import json;print(json.load(open('data/freq_multi.json'))['junMax'])")
          FOOT_DAY=$(python -c "print('$JUNMAX'.rsplit('/',1)[0] if '$JUNMAX' else '')")
          BASEM=$(python -c "import json;print(json.load(open('data/freq_multi.json'))['baseMonth'])")
          echo "old_ver=$OLD_VER"     >> "$GITHUB_OUTPUT"
          echo "new_ver=$NEW_VER"     >> "$GITHUB_OUTPUT"
          echo "badge_date=$BADGE_DATE">> "$GITHUB_OUTPUT"
          echo "foot_day=$FOOT_DAY"   >> "$GITHUB_OUTPUT"
          echo "n=$N"                 >> "$GITHUB_OUTPUT"
          echo "basem=$BASEM"         >> "$GITHUB_OUTPUT"
          echo "junmax=$JUNMAX"       >> "$GITHUB_OUTPUT"
          echo "Versao $OLD_VER -> $NEW_VER | base $BASEM | $N alunos | dados ate $JUNMAX | selo $BADGE_DATE"

      - name: Injetar dados no template
        run: |
          mkdir -p public
          python scripts/inject_into_template.py \
            template/template.html data/freq_multi.json public/index.html \
            "${{ steps.meta.outputs.new_ver }}" \
            "${{ steps.meta.outputs.badge_date }}" \
            "${{ steps.meta.outputs.foot_day }}"

      - name: Validar render (jsdom)
        run: |
          node scripts/validate_render.js public/index.html "${{ steps.meta.outputs.n }}" | tee validate.log
          grep -q 'RESULTADO: VALIDACAO OK' validate.log

      - name: Resumo da validacao (antes de publicar)
        run: |
          echo "### Build validado (freq_multi.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base: ${{ steps.meta.outputs.basem }}"        >> "$GITHUB_STEP_SUMMARY"
          echo "- Alunos: ${{ steps.meta.outputs.n }}"          >> "$GITHUB_STEP_SUMMARY"
          echo "- Dados ate: ${{ steps.meta.outputs.junmax }}"  >> "$GITHUB_STEP_SUMMARY"
          echo "- Publicar? ${{ github.event.inputs.deploy || 'true' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Ticket por unidade (R\$):**" >> "$GITHUB_STEP_SUMMARY"
          python -c "import json;t=json.load(open('data/freq_multi.json'))['tickets'];[print('- %s: %.2f'%(k,v)) for k,v in sorted(t.items(),key=lambda x:-x[1])]" >> "$GITHUB_STEP_SUMMARY" || true
          if [ -f data/faturamento.json ]; then echo "" >> "$GITHUB_STEP_SUMMARY"; echo "_Faturamento (fonte do ticket):_ \`$(cat data/faturamento.json)\`" >> "$GITHUB_STEP_SUMMARY"; else echo "" >> "$GITHUB_STEP_SUMMARY"; echo "_Ticket = valores fixos (faturamento.json ausente)._" >> "$GITHUB_STEP_SUMMARY"; fi

      - name: Garantir projeto Pages (cria se nao existir)
        if: ${{ github.event.inputs.deploy != 'false' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf %s "$CLOUDFLARE_API_TOKEN" | tr -d '[:space:]')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf %s "$CLOUDFLARE_ACCOUNT_ID" | tr -d '[:space:]')"
          npx --yes wrangler@3 pages project create "$CF_PAGES_PROJECT" --production-branch=main || true

      - name: Publicar no Cloudflare Pages
        if: ${{ github.event.inputs.deploy != 'false' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf %s "$CLOUDFLARE_API_TOKEN" | tr -d '[:space:]')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf %s "$CLOUDFLARE_ACCOUNT_ID" | tr -d '[:space:]')"
          npx --yes wrangler@3 pages deploy public \
            --project-name "$CF_PAGES_PROJECT" \
            --branch main --commit-dirty=true

      - name: Sincronizar Agenda Tática (grava iniciativas no D1)
        if: ${{ github.event.inputs.deploy != 'false' }}
        continue-on-error: true   # secundario (Agenda Tatica): nao pode derrubar o run do dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf %s "$CLOUDFLARE_API_TOKEN" | tr -d '[:space:]')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf %s "$CLOUDFLARE_ACCOUNT_ID" | tr -d '[:space:]')"
          node scripts/sync_agenda.mjs data/freq_multi.json > agenda_week.sql
          echo "Linhas SQL: $(wc -l < agenda_week.sql)"; head -c 300 agenda_week.sql; echo
          npx --yes wrangler@3 d1 execute nadarte_agenda --remote --file=agenda_week.sql

      - name: Atualizar version.txt no repo
        if: ${{ github.event.inputs.deploy != 'false' }}
        continue-on-error: true   # bump de versao e cosmetico: nao pode derrubar o run (deploy ja ocorreu)
        run: |
          echo "${{ steps.meta.outputs.new_ver }}" > version.txt
          if ! git diff --quiet version.txt; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add version.txt
            git commit -m "chore: bump versao para ${{ steps.meta.outputs.new_ver }} [skip ci]"
            # o main pode ter avancado durante o run (push manual) -> rebase antes e re-tenta
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push rejeitado (main avancou), tentativa $i; re-tentando..."; sleep 3
            done
          fi

      - name: Resumo
        if: ${{ github.event.inputs.deploy != 'false' }}
        run: |
          echo "### Dashboard atualizado :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base: ${{ steps.meta.outputs.basem }}"        >> "$GITHUB_STEP_SUMMARY"
          echo "- Alunos: ${{ steps.meta.outputs.n }}"          >> "$GITHUB_STEP_SUMMARY"
          echo "- Dados ate: ${{ steps.meta.outputs.junmax }}"  >> "$GITHUB_STEP_SUMMARY"
          echo "- Versao: ${{ steps.meta.outputs.new_ver }}"    >> "$GITHUB_STEP_SUMMARY"
