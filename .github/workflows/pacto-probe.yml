name: PACTO API — Probe de schema (716 Norte)

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/pacto_fetch.py'
      - '.github/workflows/pacto-probe.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validacao rede (PII-safe)
        env:
          PACTO_KEY_716NORTE:  ${{ secrets.PACTO_KEY_716NORTE }}
          PACTO_KEY_905SUL:    ${{ secrets.PACTO_KEY_905SUL }}
          PACTO_KEY_604NORTE:  ${{ secrets.PACTO_KEY_604NORTE }}
          PACTO_KEY_LAGONORTE: ${{ secrets.PACTO_KEY_LAGONORTE }}
          PACTO_KEY_LAGOSUL:   ${{ secrets.PACTO_KEY_LAGOSUL }}
        run: |
          python scripts/pacto_fetch.py | tee pacto_probe_result.txt

      - name: Commitar resultado (para leitura)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacto_probe_result.txt
          git commit -m "rede: validacao 5 unidades [skip ci]" || echo "sem mudanca"
          git push
