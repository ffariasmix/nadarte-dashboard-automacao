name: PACTO API — Probe de schema (716 Norte)

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/pacto_fetch.py'
      - '.github/workflows/pacto-probe.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Coletar (resumo PII-safe; sem dados pessoais)
        env:
          PACTO_API_KEY: ${{ secrets.PACTO_KEY_716NORTE }}
          PACTO_UNIT: '716NORTE'
          SAMPLE: '25'
        run: |
          python scripts/pacto_fetch.py --collect | tee pacto_probe_result.txt

      - name: Commitar resultado (para leitura)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacto_probe_result.txt
          git commit -m "collect: resumo PII-safe [skip ci]" || echo "sem mudanca"
          git push
