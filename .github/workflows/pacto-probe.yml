name: PACTO API — Probe de schema (716 Norte)

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/pacto_fetch.py'
      - '.github/workflows/pacto-probe.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar openpyxl
        run: pip install "openpyxl>=3.1"

      - name: Canario coletor REDE 5 unidades (PII-safe; .bin ficam gitignored)
        env:
          PACTO_KEY_716NORTE:  ${{ secrets.PACTO_KEY_716NORTE }}
          PACTO_KEY_905SUL:    ${{ secrets.PACTO_KEY_905SUL }}
          PACTO_KEY_604NORTE:  ${{ secrets.PACTO_KEY_604NORTE }}
          PACTO_KEY_LAGONORTE: ${{ secrets.PACTO_KEY_LAGONORTE }}
          PACTO_KEY_LAGOSUL:   ${{ secrets.PACTO_KEY_LAGOSUL }}
        run: |
          python scripts/pacto_fetch.py data 2> pacto_probe_result.txt || true
          echo "--- arquivos gerados (nomes/contagem, sem conteudo) ---" >> pacto_probe_result.txt
          python - <<'PY' >> pacto_probe_result.txt 2>&1
          import json, glob
          try:
              man = json.load(open("data/manifest.json"))
              print("manifest:", json.dumps(man, ensure_ascii=False))
          except Exception as e:
              print("sem manifest:", e)
          print("bins:", len(glob.glob("data/*.bin")))
          PY

      - name: Commitar resultado (PII-safe)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacto_probe_result.txt
          git commit -m "canario 716N coletor [skip ci]" || echo "sem mudanca"
          git push
