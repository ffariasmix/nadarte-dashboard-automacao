name: PACTO API — Probe de schema (716 Norte)

on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Limitar a 1 unidade (ex.: Natal). Vazio = todas as unidades.'
        required: false
        default: 'Natal'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar openpyxl
        run: pip install "openpyxl>=3.1"

      - name: SITPROBE — distribuicao de situacao + criterio de ativo (rapido, so cadastro)
        env:
          PACTO_SITPROBE: '1'
          PACTO_ENABLE_NATAL: '1'   # inclui a Natal (RN) APENAS neste probe (nao afeta o build/deploy)
          PACTO_ONLY: ${{ github.event.inputs.only }}   # limita a 1 unidade (default Natal) -> probe rapido
          PACTO_CONTRATO_DUMP: '1'  # Fase 1a: dump PII-safe da estrutura de contrato (datas por contrato?)
          PACTO_KEY_716NORTE:  ${{ secrets.PACTO_KEY_716NORTE }}
          PACTO_KEY_905SUL:    ${{ secrets.PACTO_KEY_905SUL }}
          PACTO_KEY_604NORTE:  ${{ secrets.PACTO_KEY_604NORTE }}
          PACTO_KEY_LAGONORTE: ${{ secrets.PACTO_KEY_LAGONORTE }}
          PACTO_KEY_LAGOSUL:   ${{ secrets.PACTO_KEY_LAGOSUL }}
          PACTO_KEY_NATAL:     ${{ secrets.PACTO_KEY_NATAL }}
        run: |
          python scripts/pacto_fetch.py data 2> pacto_probe_result.txt || true
          echo "--- arquivos gerados (nomes/contagem, sem conteudo) ---" >> pacto_probe_result.txt
          python - <<'PY' >> pacto_probe_result.txt 2>&1
          import json, glob
          try:
              man = json.load(open("data/manifest.json"))
              print("manifest:", json.dumps(man, ensure_ascii=False))
          except Exception as e:
              print("sem manifest:", e)
          print("bins:", len(glob.glob("data/*.bin")))
          PY

      - name: Commitar resultado (PII-safe)
        continue-on-error: true   # push race (main avancou durante o probe) NAO pode avermelhar o run
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacto_probe_result.txt
          git commit -m "probe: resultado [skip ci]" || { echo "sem mudanca"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && { echo "push ok"; exit 0; }
            echo "push rejeitado (main avancou), tentativa $i; re-tentando..."; sleep 3
          done
          echo "nao conseguiu push apos 5 tentativas (resultado ficou so no run)"
