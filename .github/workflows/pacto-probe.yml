name: PACTO API — Probe de schema (716 Norte)

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/pacto_fetch.py'
      - '.github/workflows/pacto-probe.yml'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Probe (apenas schema; sem dados pessoais no log)
        env:
          PACTO_API_KEY: ${{ secrets.PACTO_KEY_716NORTE }}
          PACTO_UNIT: '716NORTE'
        run: |
          python scripts/pacto_fetch.py --probe
