<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ABB Control Center</title><style>/* ABB Control Center — v2. Identidade visual Banco do Brasil.
   Azul BB #002D4B (Pantone 2955C) · Branco · acento amarelo BB. */
:root {
  --bb-blue: #002D4B;        /* azul corporativo BB */
  --bb-blue-2: #124a72;
  --bb-blue-3: #1f5f8b;
  --bb-yellow: #FADf00;      /* amarelo BB (acento) */
  --bb-yellow-soft: #FFF4C2;
  --accent: #0A6BB3;
  --sev-alta: #E5484D;
  --sev-media: #F2A007;
  --sev-baixa: #2F9E52;
  --ok: #2F9E52;
  --warn: #F2A007;
  --grey: #6B7280;
  --bg: #eef2f7;
  --surface: rgba(255,255,255,0.82);
  --surface-solid: #ffffff;
  --border: rgba(15,23,42,0.09);
  --text: #0e1f30;
  --text-soft: #5b6672;
  --radius: 16px;
  --shadow: 0 8px 30px rgba(0,45,75,0.12);
  --shadow-sm: 0 2px 10px rgba(0,45,75,0.07);
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 12% -10%, #d6e6f5 0%, transparent 55%),
    radial-gradient(900px 500px at 100% 0%, #e9eef6 0%, transparent 45%),
    var(--bg);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
a { color: var(--accent); text-decoration: none; }

/* ---------- Login ---------- */
.login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
.login-card {
  width: 100%; max-width: 430px; background: var(--surface); backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.6); border-radius: 22px; box-shadow: var(--shadow);
  padding: 34px 30px;
}
.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.brand img.logo-img { height: 42px; width: auto; }
.brand h1 { font-size: 19px; margin: 0; letter-spacing: -0.02em; color: var(--bb-blue); }
.brand .sys { display:flex; flex-direction:column; }
.muted { color: var(--text-soft); font-size: 13.5px; }
.field { margin-top: 16px; }
.field label { display: block; font-size: 12.5px; color: var(--text-soft); margin-bottom: 6px; font-weight: 600; }
.input, textarea.input, select.input {
  width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.95); font-size: 15px; outline: none; transition: box-shadow .15s, border-color .15s; color: var(--text);
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(10,107,179,0.15); }
.btn {
  width: 100%; margin-top: 18px; padding: 12px 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
  color: #fff; background: linear-gradient(135deg, var(--bb-blue), var(--bb-blue-2));
  box-shadow: 0 8px 18px rgba(0,45,75,0.28); transition: transform .06s, filter .15s;
}
.btn:hover { filter: brightness(1.1); } .btn:active { transform: translateY(1px); }
.btn.secondary { background: rgba(255,255,255,0.9); color: var(--bb-blue); border: 1px solid var(--border); box-shadow: none; }
.btn.small { width: auto; padding: 8px 14px; margin: 0; font-size: 13px; }
.btn.warn { background: linear-gradient(135deg,#c62d31,#e5484d); box-shadow:none; }
.hint { font-size: 12px; color: var(--text-soft); margin-top: 12px; }
.error-msg { color: var(--sev-alta); font-size: 13px; margin-top: 10px; min-height: 18px; }

/* ---------- App layout ---------- */
.app { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
.sidebar {
  background: linear-gradient(180deg, #002d4b, #013a5f);
  color: #eaf1f8; padding: 16px 12px; position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.side-brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 14px; border-bottom:1px solid rgba(255,255,255,0.12); margin-bottom:8px;}
.side-brand img { height: 30px; width:auto; }
.side-brand b { font-size: 13.5px; letter-spacing: 0.01em; color:#fff; line-height:1.15; }
.nav { display: flex; flex-direction: column; gap: 2px; margin-top: 6px; }
.nav a {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: #dbe7f2;
  font-size: 14px; font-weight: 500; transition: background .12s;
}
.nav a .ic { width: 18px; text-align: center; opacity: .85; }
.nav a:hover { background: rgba(255,255,255,0.08); color:#fff; }
.nav a.active { background: rgba(255,255,255,0.14); color: #fff; font-weight: 600; box-shadow: inset 3px 0 0 var(--bb-yellow); }
.nav-sep { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #8fb0c9; padding: 14px 12px 4px; }

.main { padding: 24px 30px 60px; overflow-x: hidden; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 16px; }
.topbar h2 { margin: 0; font-size: 22px; letter-spacing: -0.02em; color: var(--bb-blue); }
.topbar .sub { color: var(--text-soft); font-size: 13px; margin-top: 2px; }
.user-chip { display: flex; align-items: center; gap: 10px; }
.avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--bb-blue); display: grid; place-items: center; font-weight: 700; color: #fff; }
.lang { display:flex; gap:2px; background:rgba(0,45,75,0.06); border-radius:9px; padding:3px; }
.lang button { border:none; background:transparent; padding:4px 8px; border-radius:7px; font-size:12px; font-weight:600; color:var(--text-soft); }
.lang button.on { background:#fff; color:var(--bb-blue); box-shadow:var(--shadow-sm); }

/* mode banner */
.mode-banner {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 9px 14px; border-radius: 12px; margin-bottom: 16px;
  background: var(--bb-yellow-soft); border: 1px solid rgba(245,200,0,0.4); font-size: 13px; color: #7a5a00;
}
.mode-banner.live { background: rgba(47,158,82,0.12); border-color: rgba(47,158,82,0.3); color: #1e5c2e; }

/* cards / grid */
.grid { display: grid; gap: 16px; }
.cols-4 { grid-template-columns: repeat(4, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
.card {
  background: var(--surface-solid);
  border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 18px;
}
.card h3 { margin: 0 0 12px; font-size: 14px; color: var(--text-soft); font-weight: 600; }
.card h3 .cnt { color: var(--bb-blue); }
.kpi { position:relative; overflow:hidden; }
.kpi .label { font-size: 13px; color: var(--text-soft); font-weight: 600; }
.kpi .value { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; margin-top: 4px; color:var(--bb-blue); }
.kpi .value small { font-size: 14px; font-weight: 600; color: var(--text-soft); }
.kpi .foot { margin-top: 8px; font-size: 12.5px; color: var(--text-soft); }
.kpi .spark { position:absolute; right:14px; bottom:12px; opacity:.85; }

/* bars */
.bar-row { display: grid; grid-template-columns: 160px 1fr 60px; align-items: center; gap: 10px; margin: 8px 0; font-size: 13px; }
.bar-track { background: rgba(0,45,75,0.07); border-radius: 8px; height: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--bb-blue), var(--bb-blue-3)); }
.bar-row .num { text-align: right; color: var(--text-soft); font-variant-numeric: tabular-nums; }

/* urgent + insights */
.panel-dark { background: linear-gradient(180deg,#04263f,#062f4d); border:1px solid rgba(255,255,255,0.08); border-radius:var(--radius); padding:18px; color:#eaf1f8; }
.panel-dark h3 { color:#cfe0ef; display:flex; align-items:center; gap:8px; }
.urgent { border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px; margin-top:10px; background:rgba(255,255,255,0.03); }
.urgent .tag { display:inline-block; font-size:11px; font-weight:800; letter-spacing:.04em; padding:2px 8px; border-radius:6px; background:rgba(229,72,77,0.22); color:#ff9b9e; }
.urgent .tt { font-weight:700; margin-left:8px; }
.urgent .ds { color:#b9cbdb; font-size:13.5px; margin-top:8px; }
.urgent .mt { color:#8fb0c9; font-size:12.5px; margin-top:8px; }
.insight { border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px 16px; margin-top:10px; background:rgba(255,255,255,0.03); }
.insight .it { font-weight:700; } .insight .id { color:#b9cbdb; font-size:13.5px; margin-top:4px; }
.pager { display:flex; align-items:center; justify-content:flex-end; gap:12px; margin-top:12px; color:var(--text-soft); font-size:13px; }
.pager.dark { color:#9fbdd6; }
.pager button { border:1px solid var(--border); background:#fff; border-radius:8px; padding:6px 12px; font-size:13px; color:var(--bb-blue); }
.pager.dark button { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.15); color:#eaf1f8; }
.pager button:disabled { opacity:.4; cursor:default; }

/* toolbar / filters */
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
.select, .search {
  padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border); background: #fff; font-size: 13.5px; outline: none; color:var(--text);
}
.search { min-width: 220px; }

/* tables */
table.tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13.5px; }
.tbl th { text-align: left; color: var(--text-soft); font-weight: 700; font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; padding: 0 12px 10px; white-space:nowrap; cursor: default; }
.tbl th.sortable { cursor: pointer; user-select:none; }
.tbl th.sortable:hover { color: var(--bb-blue); }
.tbl th .arrow { opacity:.5; font-size:10px; }
.tbl th.sorted { color: var(--bb-blue); } .tbl th.sorted .arrow { opacity:1; }
.tbl td { padding: 11px 12px; border-top: 1px solid var(--border); vertical-align: middle; }
.tbl tr:hover td { background: rgba(0,45,75,0.035); cursor:pointer; }
.tbl .id { color: var(--text-soft); font-variant-numeric: tabular-nums; font-weight:600; }
.tbl .title { font-weight: 500; max-width: 380px; }
.tbl.trn td { border-color: rgba(255,255,255,0.06); }

/* chips */
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.chip .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .9; }
.chip.sev-alta { background: rgba(229,72,77,0.12); color: #b32b30; }
.chip.sev-media { background: rgba(242,160,7,0.16); color: #8a5a00; }
.chip.sev-baixa { background: rgba(47,158,82,0.14); color: #1e6b34; }
.chip.st-open { background: rgba(10,107,179,0.12); color: #0a5b96; }
.chip.st-done { background: rgba(47,158,82,0.14); color: #1e6b34; }
.chip.st-cancel { background: rgba(107,114,128,0.15); color: #4b5563; }
.chip.cat { background: rgba(0,45,75,0.08); color: var(--bb-blue); }
.chip.tiny { font-size:11px; padding:2px 8px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 8px; background: rgba(0,45,75,0.06); color: var(--bb-blue); font-size: 12px; font-weight:600; margin:1px 2px 1px 0; }
.badge.grey { background: rgba(15,23,42,0.06); color: var(--text-soft); }
.ok-ic { color: var(--ok); font-weight:800; } .no-ic { color:#cbd5e1; } .warn-ic{ color:var(--warn); }

/* evidence gallery */
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
.ev-card { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--surface-solid); box-shadow: var(--shadow-sm); display:flex; flex-direction:column; }
.ev-thumb { height: 120px; background: linear-gradient(135deg,#e4edf6,#eef2f8); display: grid; place-items: center; color: var(--bb-blue-3); font-size: 26px; }
.ev-meta { padding: 12px; display:flex; flex-direction:column; gap:6px; flex:1; }
.ev-meta .t { font-size: 13.5px; font-weight: 600; line-height:1.25; }
.ev-meta .s { font-size: 11.5px; color: var(--text-soft); }
.ev-links { display:flex; flex-wrap:wrap; gap:4px; }

/* timeline */
.timeline { position: relative; margin-left: 8px; }
.tl-item { position: relative; padding: 0 0 16px 22px; border-left: 2px solid var(--border); }
.tl-item::before { content:''; position: absolute; left: -7px; top: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--bb-blue-3); box-shadow: 0 0 0 3px rgba(31,95,139,0.15); }
.tl-item .act { font-weight: 600; font-size: 13.5px; } .tl-item .meta { font-size: 12px; color: var(--text-soft); margin-top: 2px; }

/* modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,20,35,0.4); backdrop-filter: blur(3px); display: grid; place-items: center; z-index: 50; padding: 20px; }
.modal { width: 100%; max-width: 660px; background: var(--surface-solid); border-radius: 18px; box-shadow: var(--shadow); max-height: 88vh; overflow: auto; }
.modal.wide { max-width: 820px; }
.modal .mhead { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 22px 6px; }
.modal .mhead h3 { margin: 0; font-size: 17px; color:var(--bb-blue); }
.modal .mbody { padding: 8px 22px 22px; }
.close { border: none; background: transparent; font-size: 20px; color: var(--text-soft); cursor: pointer; }
.kv { display: grid; grid-template-columns: 160px 1fr; gap: 8px 12px; font-size: 13.5px; margin-top: 8px; }
.kv .k { color: var(--text-soft); }
.tabs { display: flex; gap: 4px; margin: 14px 0; border-bottom: 1px solid var(--border); flex-wrap:wrap; }
.tabs button { border: none; background: transparent; padding: 8px 12px; font-size: 13px; color: var(--text-soft); border-bottom: 2px solid transparent; }
.tabs button.active { color: var(--bb-blue); border-color: var(--bb-blue); font-weight: 600; }
.checklist { display:flex; flex-direction:column; gap:6px; max-height:220px; overflow:auto; border:1px solid var(--border); border-radius:10px; padding:8px; }
.checklist label { display:flex; align-items:center; gap:8px; font-size:13px; padding:4px; border-radius:8px; }
.checklist label:hover { background:rgba(0,45,75,0.04); }
.danger-box { border:1px solid rgba(229,72,77,0.3); background:rgba(229,72,77,0.06); border-radius:12px; padding:12px 14px; font-size:13px; color:#8a2a2d; margin-top:12px; }

.empty { text-align: center; color: var(--text-soft); padding: 40px; font-size: 14px; }
.skeleton { background: linear-gradient(90deg,#eef2f7,#e1e9f2,#eef2f7); background-size: 200% 100%; animation: sh 1.2s infinite; border-radius: 8px; height: 14px; }
@keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.fade { animation: fade .25s ease; } @keyframes fade { from{opacity:0; transform: translateY(4px)} to{opacity:1; transform:none} }
.switch { display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; }

/* responsive */
@media (max-width: 1024px) {
  .cols-4 { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: fixed; z-index: 40; left: -270px; transition: left .2s; width: 250px; box-shadow: var(--shadow); }
  .sidebar.open { left: 0; }
  .cols-4, .cols-3, .cols-2 { grid-template-columns: 1fr; }
  .main { padding: 18px 16px 60px; }
  .menu-btn { display: inline-flex !important; }
  .tbl-wrap { overflow-x:auto; }
  .kv { grid-template-columns: 1fr; gap:2px 0; }
  .kv .k { margin-top:8px; }
}
.menu-btn { display: none; }
.tbl-wrap { overflow-x: auto; }

// ===================== LOGIN =====================
function renderLogin(msg) {
  document.body.innerHTML = '';
  const wrap = el(`<div class="login-wrap"><div class="login-card fade">
    <div class="brand">${LOGO() ? `<img class="logo-img" src="${LOGO()}" alt="Banco do Brasil">` : ''}
      <div class="sys"><h1>ABB Control Center</h1></div></div>
    <div id="s1">
      <div class="field"><label>${t('login_email')}</label><input class="input" id="email" type="email" maxlength="120" placeholder="seu.nome@bb.com.br"></div>
      <button class="btn" id="send">${t('login_send')}</button><div class="error-msg" id="err">${msg ? esc(msg) : ''}</div>
    </div>
    <div id="s2" style="display:none">
      <div class="field"><label>${t('login_code')}</label><input class="input" id="code" maxlength="6" placeholder="000000"></div>
      <button class="btn" id="verify">${t('login_enter')}</button><button class="btn secondary" id="back" style="margin-top:8px">${t('login_back')}</button>
      <div class="error-msg" id="err2"></div>
    </div>
    <div class="hint" id="mh"></div>
  </div></div>`);
  document.body.appendChild(wrap);
  const demo = ABB.cfg.demo;
  $('#mh').innerHTML = demo ? 'Modo demonstração — use qualquer e-mail e qualquer código. Sessão de 24h no sistema real.' : `Login por código · sessão de 24h · API: <b>${esc(ABB.cfg.apiBase || '(não configurada)')}</b>`;
  $('#send').onclick = async () => { const em = $('#email').value.trim(); if (!em.includes('@')) { $('#err').textContent = 'E-mail inválido.'; return; } try { await ABB.requestCode(em); window.__em = em; $('#s1').style.display = 'none'; $('#s2').style.display = 'block'; if (demo) $('#err2').textContent = 'Demo: digite qualquer código.'; } catch (e) { $('#err').textContent = e.message; } };
  $('#verify').onclick = async () => { try { await ABB.verifyCode(window.__em, $('#code').value.trim() || '000000'); boot(); } catch (e) { $('#err2').textContent = e.message; } };
  $('#back').onclick = () => { $('#s2').style.display = 'none'; $('#s1').style.display = 'block'; };
  $('#email').addEventListener('keydown', e => { if (e.key === 'Enter') $('#send').click(); });
  $('#code').addEventListener('keydown', e => { if (e.key === 'Enter') $('#verify').click(); });
}

// ===================== SHELL =====================
function renderShell() {
  document.body.innerHTML = '';
  const nav = MODULES.filter(m => (!m.master || isMaster())).map(m => m.sep ? `<div class="nav-sep">${t(m.sep)}</div>` : `<a href="#${m.id}" data-mod="${m.id}"><span class="ic">${m.ic}</span>${t(m.id)}</a>`).join('');
  const initials = (STATE.me?.name || 'U').slice(0, 1).toUpperCase();
  document.body.appendChild(el(`<div class="app">
    <aside class="sidebar" id="sb"><div class="side-brand">${LOGO_W() ? `<img src="${LOGO_W()}" alt="BB">` : ''}<b>ABB<br>Control Center</b></div><nav class="nav" id="nav">${nav}</nav></aside>

        <div style="display:flex;align-items:center;gap:12px"><button class="btn small secondary menu-btn" id="mb">☰</button><div><h2 id="vt"></h2><div class="sub" id="vs"></div></div></div>
        <div class="user-chip">
          <div class="lang" id="lang">${['pt', 'en', 'es'].map(l => `<button data-l="${l}" class="${ABB.cfg.lang === l ? 'on' : ''}">${l.toUpperCase()}</button>`).join('')}</div>
          <div style="text-align:right"><div style="font-size:13px;font-weight:600">${esc(STATE.me?.name)}</div><div class="muted" style="font-size:12px">${esc(roleName(STATE.me?.role))} · ${esc(STATE.me?.team || '')}</div></div>

      </div><div id="view"></div>

  $('#lo').onclick = () => { ABB.logout(); renderLogin(); };
  $('#mb').onclick = () => $('#sb').classList.toggle('open');
  $('#nav').onclick = e => { if (e.target.closest('a')) $('#sb').classList.remove('open'); };
  $('#lang').onclick = e => { const b = e.target.closest('button'); if (b) { ABB.cfg.lang = b.dataset.l; renderShell(); } };
  window.addEventListener('hashchange', route);
  route();
}
function roleName(r) { return { master: 'Master', admin: 'Administrador', editor: 'Editor', leitor: 'Leitor' }[r] || r || ''; }
function setActive(m) { document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.dataset.mod === m)); }
function setTitle(a, b) { $('#vt').textContent = a; $('#vs').textContent = b || ''; }
function banner() { return ABB.cfg.demo ? `<div class="mode-banner">${t('demo_b')}</div>` : `<div class="mode-banner live">● API: ${esc(ABB.cfg.apiBase)}</div>`; }
function loading() { $('#view').innerHTML = banner() + `<div class="grid cols-4">${'<div class="card"><div class="skeleton" style="height:60px"></div></div>'.repeat(4)}</div>`; }
async function route() {
  const m = location.hash.replace('#', '') || 'dashboard';
  const conf = MODULES.find(x => x.id === m);
  if (!conf || (conf.master && !isMaster())) { location.hash = 'dashboard'; return; }
  setActive(m);
  try { ({ dashboard: viewDashboard, bugs: viewBugs, fixes: viewFixes, journeys: viewJourneys, validations: viewValidations, evidences: viewEvidences, audit: viewAudit, admin: viewAdmin, settings: viewSettings }[m] || viewDashboard)(); }
  catch (e) { $('#view').innerHTML = banner() + `<div class="empty">Erro: ${esc(e.message)}</div>`; }
}

function renderUrgent(list) {
  const per = 4, pages = Math.max(1, Math.ceil(list.length / per)), pg = Math.min(Math.max(0, window.__up), pages - 1); window.__up = pg;
  $('#up').innerHTML = `<h3>${t('s_urgent')}</h3>${list.slice(pg * per, pg * per + per).map(u => `<div class="urgent"><div><span class="tag">BUG</span><span class="tt">Bug #${u.id} · ${u.days}d</span></div><div class="ds">${esc(u.title)}</div><div class="mt">${esc(u.team || '—')} / ${esc(u.focal || '—')} · ${t('charge')}</div></div>`).join('') || `<div class="insight">${t('no_urgent')}</div>`}
    <div class="pager dark"><button data-up="-1" ${pg === 0 ? 'disabled' : ''}>${t('prev')}</button><span>${t('page')} ${pg + 1}/${pages} · ${list.length}</span><button data-up="1" ${pg >= pages - 1 ? 'disabled' : ''}>${t('next')}</button></div>`;
}
function barList(arr, grad) { const mx = Math.max(1, ...arr.map(x => x.n)); return arr.map(x => `<div class="bar-row"><div>${esc(x.label)}</div><div class="bar-track"><div class="bar-fill" style="width:${(x.n / mx * 100).toFixed(0)}%;${grad ? 'background:' + grad : ''}"></div></div><div class="num">${x.n}</div></div>`).join(''); }
function seriesChart(series) {
  const w = 760, h = 180, pad = 24, mx = Math.max(...series.map(s => s.abertos)) * 1.1;
  const x = i => pad + i / (series.length - 1) * (w - pad * 2), y = v => h - pad - (v / mx) * (h - pad * 2);
  const line = (k, c) => `<polyline fill="none" stroke="${c}" stroke-width="2.5" points="${series.map((s, i) => `${x(i).toFixed(0)},${y(s[k]).toFixed(0)}`).join(' ')}"/>` + series.map((s, i) => `<circle cx="${x(i).toFixed(0)}" cy="${y(s[k]).toFixed(0)}" r="3" fill="${c}"/>`).join('');
  return `<div class="tbl-wrap"><svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px">${line('abertos', '#0A6BB3')}${line('resolvidos', '#2F9E52')}${line('correcoes', '#F2A007')}${series.map((s, i) => `<text x="${x(i).toFixed(0)}" y="${h - 4}" font-size="10" fill="#6b7280" text-anchor="middle">${s.label}</text>`).join('')}</svg></div>
  <div style="display:flex;gap:16px;font-size:12px;color:var(--text-soft);margin-top:6px"><span>● <b style="color:#0A6BB3">${t('open_line')}</b></span><span>● <b style="color:#2F9E52">${t('resolved_line')}</b></span><span>● <b style="color:#F2A007">${t('fixes_line')}</b></span></div>`;
}

    </div>
    <div class="field"><label>${t('c_email')} *</label><input class="input" id="ivE" maxlength="120" placeholder="nome@bb.com.br"></div>
    <div class="grid cols-2" style="gap:12px"><div class="field"><label>${t('c_role')}</label><select class="input" id="ivR">${roles.filter(r => r.id !== 'master').map(r => `<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select></div><div class="field"><label>${t('c_team')}</label><select class="input" id="ivT">${STATE.lookups.teams.map(t => `<option value="${esc(t.name)}">${esc(t.name)}</option>`).join('')}</select></div></div>
    <div class="error-msg" id="ivErr"></div><button class="btn small" id="ivSave" style="margin-top:8px">Enviar convite</button>`);
  $('#ivSave').onclick = async () => {
    const nome = $('#ivN').value.trim(), sob = $('#ivS').value.trim(), email = $('#ivE').value.trim();
    if (!nome) { $('#ivErr').textContent = 'Informe o nome.'; return; }
    if (!sob) { $('#ivErr').textContent = 'Informe o sobrenome.'; return; }
    if (!email.includes('@')) { $('#ivErr').textContent = 'Informe um e-mail válido.'; return; }
    const rn = roles.find(r => r.id === $('#ivR').value);
    await ABB.inviteUser({ name: nome + ' ' + sob, first_name: nome, last_name: sob, email, role: rn.id, role_name: rn.name, team: $('#ivT').value });
    closeModal(); toast('Convite enviado.'); viewAdmin();
  };
}

// ===================== SETTINGS =====================
function viewSettings() {
  setTitle(t('settings'), t('sub_settings'));
  $('#view').innerHTML = `<div class="card fade" style="max-width:640px">
    <h3>Fonte de dados</h3>
    <label class="switch"><input type="checkbox" id="demoTgl" ${ABB.cfg.demo ? 'checked' : ''}> Modo demonstração (dados de exemplo)</label>
    <div class="field" style="margin-top:16px"><label>URL base da API</label><input class="input" id="apiBase" maxlength="200" placeholder="https://abb-control-center.ffariasmix.workers.dev" value="${esc(ABB.cfg.apiBase)}"></div>
    <div class="field"><label>Autenticação (quando conectado à API)</label><select class="input" id="authMode"><option value="access" ${ABB.cfg.accessMode ? 'selected' : ''}>Cloudflare Access (código, sessão 24h)</option><option value="otp" ${!ABB.cfg.accessMode ? 'selected' : ''}>Código por e-mail (OTP)</option></select></div>
    <div class="hint">No sistema publicado o modo demo fica desligado e a autenticação é sempre Cloudflare Access. Tela técnica, só para Master.</div>
    <button class="btn small" id="saveCfg" style="margin-top:16px">Salvar e recarregar</button>
  </div>`;
  $('#saveCfg').onclick = () => { ABB.cfg.demo = $('#demoTgl').checked; ABB.cfg.apiBase = $('#apiBase').value.trim(); ABB.cfg.accessMode = $('#authMode').value === 'access'; ABB.cfg.token = ''; renderLogin('Configuração salva.'); };
}

// ===================== HELPERS =====================
function openModal(title, body, wide) {
  const bg = el(`<div class="modal-bg"><div class="modal ${wide ? 'wide' : ''} fade"><div class="mhead"><h3>${title}</h3><button class="close">×</button></div><div class="mbody">${body}</div></div></div>`);
  document.body.appendChild(bg);
  bg.querySelector('.close').onclick = closeModal; bg.onclick = e => { if (e.target === bg) closeModal(); };
  document.addEventListener('keydown', function esc(ev) { if (ev.key === 'Escape') { closeModal(); document.removeEventListener('keydown', esc); } });
  return true;
}
function closeModal() { document.querySelector('.modal-bg')?.remove(); }
function confirmTwoMaster(what, onOk) {
  openModal('Confirmação dupla de Master', `<div class="danger-box">${esc(what)}.<br><br>Toda exclusão exige <b>2 confirmações de Master</b> e registra log. (Demo: marque as duas caixas.)</div>
    <div class="field" style="margin-top:12px"><label>Comentário / motivo (log)</label><input class="input" id="dc" maxlength="200" placeholder="Por que está excluindo"></div>
    <label class="switch" style="margin-top:6px"><input type="checkbox" id="m1"> Confirmo (Master 1)</label><br><label class="switch" style="margin-top:8px"><input type="checkbox" id="m2"> Confirmo (Master 2)</label><br>
    <button class="btn small warn" id="delOk" style="margin-top:14px">Excluir definitivamente</button>`);
  $('#delOk').onclick = () => { if ($('#m1').checked && $('#m2').checked) { const c = $('#dc').value.trim(); closeModal(); onOk(c); } else toast('Marque as duas confirmações de Master.'); };
}
function toast(msg) { const x = el(`<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bb-blue);color:#fff;padding:12px 20px;border-radius:12px;box-shadow:var(--shadow);z-index:100;font-size:14px;font-weight:500" class="fade">${esc(msg)}</div>`); document.body.appendChild(x); setTimeout(() => x.remove(), 2400); }

async function boot() { try { STATE.me = await ABB.me(); STATE.lookups = await ABB.lookups(); renderShell(); } catch (e) { ABB.logout(); renderLogin(e.status === 401 ? 'Sessão expirada.' : (e.message || 'Falha.')); } }
if (!ABB.cfg.demo && ABB.cfg.accessMode) boot(); else if (ABB.cfg.token) boot(); else renderLogin();
</script></body></html>
